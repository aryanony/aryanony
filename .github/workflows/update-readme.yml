name: Update README with latest blog posts

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:  # allows manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://medium.com/feed/@aryanony,https://hashnode.com/@aryanony/feed.xml"
          max_post_count: 5
          comment_tag_name: "BLOG-POST-LIST"
          template: "<a href='$link' target='_blank'>$title</a><br/><sub>$date</sub>"
          committer_username: "aryanony"
          committer_email: "aryanrajk63@gmail.com"
